<style>
  :root{
    --paper:#EEF0EA; --surface:#FFFFFF; --surface-alt:#F4F5EF;
    --ink:#1F2A24; --ink-soft:#5B6960; --ink-faint:#8C978F;
    --accent:#8A6D3B; --accent-soft:#C9A66B; --accent-wash:#F1E8D6;
    --line:#DADFD3; --danger:#A6503A; --danger-wash:#F3E3DD;
    --success:#4B6B4F; --success-wash:#E4EBE0;
    --radius:10px; --shadow:0 1px 2px rgba(31,42,36,0.06),0 8px 24px rgba(31,42,36,0.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .app{max-width:640px;margin:0 auto;padding:28px 20px 80px;}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;border-bottom:1px solid var(--line);padding-bottom:20px;}
  .brand-mark{width:42px;height:42px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:18px;font-weight:600;flex-shrink:0;}
  .brand-name{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-0.01em;}
  .brand-sub{font-size:12px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

  .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--line);}
  .tabs button{border:none;background:transparent;padding:11px 4px;margin-right:22px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-faint);cursor:pointer;position:relative;top:1px;border-bottom:2px solid transparent;}
  .tabs button.active{color:var(--ink);border-bottom:2px solid var(--accent);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);}
  .card + .card{margin-top:16px;}
  h2.section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0 0 4px;}
  .section-desc{color:var(--ink-soft);font-size:13.5px;margin:0 0 18px;line-height:1.5;}

  label.field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
  input[type=text], input[type=tel], input[type=date]{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font-family:'Inter',sans-serif;font-size:14px;background:var(--surface);color:var(--ink);
  }
  input:focus{outline:2px solid var(--accent-soft);outline-offset:1px;border-color:var(--accent);}
  .field{margin-bottom:14px;}
  .field-row{display:flex;gap:12px;}
  .field-row > *{flex:1;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:7px;border:1px solid transparent;font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;transition:transform .08s ease;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:#141C17;}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-outline:hover{border-color:var(--ink-soft);}
  .btn-danger{background:var(--danger-wash);color:var(--danger);}
  .btn-danger:hover{background:#EBD2C8;}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

  .empty{text-align:center;padding:36px 20px;color:var(--ink-faint);}

  .stamp{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:5px;border:1px dashed currentColor;}
  .stamp.confirmed{color:var(--success);background:var(--success-wash);}
  .stamp.cancelled{color:var(--danger);background:var(--danger-wash);}

  .booking-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .booking-row:last-child{border-bottom:none;}
  .booking-date{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);width:150px;flex-shrink:0;}
  .booking-main{flex:1;min-width:160px;}
  .booking-service{font-weight:600;font-size:14.5px;}
  .booking-actions{display:flex;gap:8px;flex-shrink:0;}

  .service-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .service-row:last-child{border-bottom:none;}
  .service-info{flex:1;}
  .service-name{font-weight:600;font-size:14.5px;}
  .service-meta{font-size:12.5px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

  .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;margin-top:14px;}
  .slot-ticket{font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:9px 6px;text-align:center;border-radius:6px;border:1px solid var(--line);background:var(--surface-alt);cursor:pointer;transition:all .12s ease;}
  .slot-ticket:hover{border-color:var(--accent);color:var(--accent);}
  .slot-ticket.selected{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .confirm-box{text-align:center;padding:30px 20px;}
  .confirm-circle{width:64px;height:64px;border-radius:50%;background:var(--success-wash);color:var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;}
  .confirm-ref{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-faint);margin-top:6px;}

  .banner{font-size:12.5px;color:var(--ink-soft);background:var(--accent-wash);border:1px solid var(--accent-soft);border-radius:7px;padding:10px 13px;margin-bottom:18px;line-height:1.5;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:8px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:50;}
  .toast.show{opacity:1;}
</style>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- PASTE YOUR FIREBASE CONFIG HERE (Project settings → General → Your apps → SDK setup) ----
const firebaseConfig = {
  apiKey: "AIzaSyAT5hqsO-5pUDyieh8FqEikseWZF8zEIYQ",
  authDomain: "booking-scheduler-6d603.firebaseapp.com",
  projectId: "booking-scheduler-6d603",
  storageBucket: "booking-scheduler-6d603.firebasestorage.app",
  messagingSenderId: "329605483889",
  appId: "1:329605483889:web:a9bb76345b6a03d2fefad0",
  measurementId: "G-8FLV8LZGJR"
};
// -----------------------------------------------------------------------------------------

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const docRef = doc(db, 'scheduler', 'main');

let data = null;
let state = {
  tab:'book', bookServiceId:null, bookDate:'', bookSlot:null, bookName:'', bookPhone:'',
  lookupPhone:'', lookupResults:null, rescheduleId:null, rescheduleFlag:false, justBooked:null,
};

function defaultData(){
  return {
    settings: { businessName: 'Cedar & Co. Studio', cancellationHours: 24, slotDuration: 30, adminPasscode: '1234' },
    weeklyHours: { 0:[], 1:[{start:'09:00',end:'17:00'}], 2:[{start:'09:00',end:'17:00'}], 3:[{start:'09:00',end:'17:00'}], 4:[{start:'09:00',end:'17:00'}], 5:[{start:'09:00',end:'15:00'}], 6:[] },
    services: [
      {id:'s1', name:'Haircut & Style', duration:45, active:true},
      {id:'s2', name:'Beard Trim', duration:20, active:true},
      {id:'s3', name:'Color Consultation', duration:30, active:false},
    ],
    blocked: [], bookings: [],
  };
}

async function loadData(){
  try{
    const snap = await getDoc(docRef);
    if(snap.exists()){ data = snap.data().payload ? JSON.parse(snap.data().payload) : defaultData(); }
    else { data = defaultData(); await saveData(); }
  }catch(e){
    console.error('load failed', e);
    data = defaultData();
    showToast('Could not reach the database — check your Firebase config');
  }

  // live sync: re-render whenever the shared record changes (e.g. the business updates hours)
  onSnapshot(docRef, (snap)=>{
    if(!snap.exists()) return;
    data = snap.data().payload ? JSON.parse(snap.data().payload) : data;
    render();
  });
}
async function saveData(){
  try{ await setDoc(docRef, { payload: JSON.stringify(data) }); }
  catch(e){ console.error('save failed', e); showToast('Could not save — check your Firebase config'); }
}

function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function toMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function fromMinutes(m){ const h=Math.floor(m/60).toString().padStart(2,'0'); const mi=(m%60).toString().padStart(2,'0'); return h+':'+mi; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function formatTimeDisplay(t){ const [h,m]=t.split(':').map(Number); const period=h>=12?'PM':'AM'; let hh=h%12; if(hh===0)hh=12; return hh+':'+m.toString().padStart(2,'0')+' '+period; }
function formatDateDisplay(dateStr){ const d=new Date(dateStr+'T00:00:00'); return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') e.className=attrs[k];
    else if(k==='html') e.innerHTML=attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function getSlotsForDate(dateStr, service){
  if(!service) return [];
  const day = new Date(dateStr+'T00:00:00').getDay();
  const ranges = data.weeklyHours[day] || [];
  const step = data.settings.slotDuration;
  const duration = service.duration;
  const wholeDayBlocked = data.blocked.some(b=>b.date===dateStr && !b.time);
  if(wholeDayBlocked) return [];
  let starts = [];
  ranges.forEach(r=>{
    let cur = toMinutes(r.start); const end = toMinutes(r.end);
    while(cur + duration <= end){ starts.push(cur); cur += step; }
  });
  const isToday = dateStr === todayISO();
  if(isToday){ const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes(); starts=starts.filter(m=>m>nowMin); }
  const dayBookings = data.bookings.filter(b=>b.date===dateStr && b.status==='confirmed' && !(state.rescheduleId && b.id===state.rescheduleId));
  const dayBlocks = data.blocked.filter(b=>b.date===dateStr && b.time);
  starts = starts.filter(startMin=>{
    const slotEnd = startMin + duration;
    const overlapsBooking = dayBookings.some(b=>{
      const bStart = toMinutes(b.time);
      const bSvc = data.services.find(s=>s.id===b.serviceId);
      const bEnd = bStart + (bSvc?bSvc.duration:step);
      return startMin < bEnd && slotEnd > bStart;
    });
    const overlapsBlock = dayBlocks.some(b=>{ const bStart=toMinutes(b.time); const bEnd=bStart+step; return startMin<bEnd && slotEnd>bStart; });
    return !overlapsBooking && !overlapsBlock;
  });
  return starts.map(fromMinutes);
}

function canModifyBooking(b){
  if(b.status !== 'confirmed') return false;
  const dt = new Date(b.date+'T'+b.time+':00');
  const cutoff = new Date(dt.getTime() - data.settings.cancellationHours*3600000);
  return new Date() < cutoff && dt > new Date();
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderTopbar());
  app.appendChild(renderTabs());
  app.appendChild(renderContent());
}

function renderTopbar(){
  return el('div',{class:'topbar'},[
    el('div',{class:'brand-mark'},[data.settings.businessName.charAt(0)]),
    el('div',{},[
      el('div',{class:'brand-name'},[data.settings.businessName]),
      el('div',{class:'brand-sub'},['Book a service · no payment required']),
    ])
  ]);
}

function renderTabs(){
  const tabs = [['book','Book a service'],['mine','My bookings']];
  const wrap = el('div',{class:'tabs'});
  tabs.forEach(([id,label])=>{
    wrap.appendChild(el('button',{class: state.tab===id?'active':'', onclick:()=>{state.tab=id; state.justBooked=null; render();}},[label]));
  });
  return wrap;
}

function renderContent(){
  const wrap = el('div',{});
  if(state.tab==='book') wrap.appendChild(renderBookFlow());
  if(state.tab==='mine') wrap.appendChild(renderMyBookings());
  return wrap;
}

function renderBookFlow(){
  if(state.justBooked){
    const b = state.justBooked;
    const svc = data.services.find(s=>s.id===b.serviceId);
    const card = el('div',{class:'card confirm-box'});
    card.appendChild(el('div',{class:'confirm-circle'},['✓']));
    card.appendChild(el('h2',{class:'section-title'},[state.rescheduleFlag?'Rescheduled':'Booking confirmed']));
    card.appendChild(el('p',{class:'section-desc'},[svc.name+' on '+formatDateDisplay(b.date)+' at '+formatTimeDisplay(b.time)+'. No payment is needed — just show up.']));
    card.appendChild(el('div',{class:'confirm-ref'},['Reference '+b.id.toUpperCase()]));
    card.appendChild(el('button',{class:'btn btn-primary', style:'margin-top:18px;', onclick:()=>{
      state.justBooked=null; state.bookServiceId=null; state.bookDate=''; state.bookSlot=null; state.bookName=''; state.bookPhone=''; state.rescheduleId=null; state.rescheduleFlag=false;
      render();
    }},['Book another']));
    return card;
  }

  const wrap = el('div',{});
  wrap.appendChild(el('div',{class:'banner'},['Shared via this business\'s Facebook Marketplace listing. Pick a service, choose an open slot, and you\'re booked — no payment collected here.']));

  const card = el('div',{class:'card'});
  card.appendChild(el('h2',{class:'section-title'},['Choose a service']));
  const activeServices = data.services.filter(s=>s.active);
  if(activeServices.length===0){
    card.appendChild(el('div',{class:'empty'},['No services are open for booking right now.']));
  }
  activeServices.forEach(svc=>{
    const selected = state.bookServiceId===svc.id;
    card.appendChild(el('div',{class:'service-row', style: selected?'background:var(--accent-wash);border-radius:8px;padding-left:8px;padding-right:8px;':'', onclick:()=>{ state.bookServiceId=svc.id; state.bookSlot=null; render(); }},[
      el('div',{class:'service-info'},[el('div',{class:'service-name'},[svc.name]), el('div',{class:'service-meta'},[svc.duration+' min'])]),
    ]));
  });
  wrap.appendChild(card);

  if(state.bookServiceId){
    const svc = data.services.find(s=>s.id===state.bookServiceId);
    const dateCard = el('div',{class:'card'});
    dateCard.appendChild(el('h2',{class:'section-title'},['Pick a date']));
    dateCard.appendChild(el('input',{type:'date', value:state.bookDate, min:todayISO(), onchange:(e)=>{ state.bookDate=e.target.value; state.bookSlot=null; render(); }}));
    if(state.bookDate){
      const slots = getSlotsForDate(state.bookDate, svc);
      if(slots.length===0){
        dateCard.appendChild(el('p',{class:'section-desc', style:'margin-top:14px;'},['No open slots this day — try another date.']));
      } else {
        const grid = el('div',{class:'slot-grid'});
        slots.forEach(t=>{ grid.appendChild(el('button',{class:'slot-ticket'+(state.bookSlot===t?' selected':''), onclick:()=>{ state.bookSlot=t; render(); }},[formatTimeDisplay(t)])); });
        dateCard.appendChild(grid);
      }
    }
    wrap.appendChild(dateCard);

    if(state.bookSlot){
      const formCard = el('div',{class:'card'});
      formCard.appendChild(el('h2',{class:'section-title'},[state.rescheduleId?'Confirm new time':'Your details']));
      let nameInput, phoneInput;
      if(!state.rescheduleId){
        nameInput = el('input',{type:'text', placeholder:'Full name', value:state.bookName, oninput:(e)=>{state.bookName=e.target.value;}});
        phoneInput = el('input',{type:'tel', placeholder:'Phone number', value:state.bookPhone, oninput:(e)=>{state.bookPhone=e.target.value;}});
        formCard.appendChild(el('div',{class:'field-row'},[
          el('div',{class:'field'},[el('label',{class:'field-label'},['Name']), nameInput]),
          el('div',{class:'field'},[el('label',{class:'field-label'},['Phone']), phoneInput]),
        ]));
      }
      formCard.appendChild(el('button',{class:'btn btn-primary', onclick: async ()=>{
        if(state.rescheduleId){
          const b = data.bookings.find(x=>x.id===state.rescheduleId);
          b.date = state.bookDate; b.time = state.bookSlot;
          await saveData();
          state.justBooked = b; state.rescheduleFlag = true; render();
        } else {
          if(!state.bookName.trim() || !state.bookPhone.trim()){ showToast('Add your name and phone'); return; }
          const booking = { id:uid('bk'), serviceId:svc.id, date:state.bookDate, time:state.bookSlot, customerName:state.bookName.trim(), customerPhone:state.bookPhone.trim(), status:'confirmed', createdAt:Date.now() };
          data.bookings.push(booking);
          await saveData();
          state.justBooked = booking; state.rescheduleFlag = false; render();
        }
      }},[state.rescheduleId?'Confirm reschedule':'Confirm booking']));
      wrap.appendChild(formCard);
    }
  }
  return wrap;
}

function renderMyBookings(){
  const wrap = el('div',{});
  const card = el('div',{class:'card'});
  card.appendChild(el('h2',{class:'section-title'},['Find your bookings']));
  card.appendChild(el('p',{class:'section-desc'},['Enter the phone number you booked with.']));
  const phoneInput = el('input',{type:'tel', placeholder:'Phone number', value:state.lookupPhone, oninput:(e)=>{state.lookupPhone=e.target.value;}});
  card.appendChild(el('div',{class:'field-row', style:'align-items:flex-end;'},[
    el('div',{class:'field', style:'flex:2;'},[el('label',{class:'field-label'},['Phone']), phoneInput]),
    el('button',{class:'btn btn-primary', onclick:()=>{ state.lookupResults = data.bookings.filter(b=>b.customerPhone.trim()===state.lookupPhone.trim()); render(); }},['Find bookings']),
  ]));
  wrap.appendChild(card);

  if(state.lookupResults){
    const resCard = el('div',{class:'card'});
    if(state.lookupResults.length===0){
      resCard.appendChild(el('div',{class:'empty'},['No bookings found for that number.']));
    } else {
      state.lookupResults.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).forEach(b=>{
        const svc = data.services.find(s=>s.id===b.serviceId);
        const modifiable = canModifyBooking(b);
        resCard.appendChild(el('div',{class:'booking-row'},[
          el('div',{class:'booking-date'},[formatDateDisplay(b.date)+' · '+formatTimeDisplay(b.time)]),
          el('div',{class:'booking-main'},[
            el('div',{class:'booking-service'},[svc?svc.name:'(removed service)']),
            el('div',{},[el('span',{class:'stamp '+b.status},[b.status])]),
          ]),
          el('div',{class:'booking-actions'},[
            b.status==='confirmed' ? el('button',{class:'btn btn-outline btn-sm', disabled:!modifiable, onclick:()=>{
              state.tab='book'; state.bookServiceId=b.serviceId; state.bookDate=b.date; state.bookSlot=null; state.rescheduleId=b.id; render();
            }},['Reschedule']) : null,
            b.status==='confirmed' ? el('button',{class:'btn btn-danger btn-sm', disabled:!modifiable, onclick: async ()=>{ b.status='cancelled'; await saveData(); render(); }},['Cancel']) : null,
          ])
        ]));
        if(b.status==='confirmed' && !modifiable){
          resCard.appendChild(el('p',{class:'section-desc', style:'margin:-8px 0 12px;font-size:12px;'},['Outside the '+data.settings.cancellationHours+'-hour window — contact the business directly to change this.']));
        }
      });
    }
    wrap.appendChild(resCard);
  }
  return wrap;
}

(async function init(){ await loadData(); render(); })();
</script>
